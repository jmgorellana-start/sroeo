<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo de entradas</title>
<style>
  body{
    font-family:Arial, sans-serif;
    background:#111;
    color:#fff;
    text-align:center;
    margin:0;
    padding:20px;
  }
  button{
    font-size:22px;
    padding:14px 26px;
    margin:12px;
    cursor:pointer;
    border:0;
    border-radius:10px;
  }
  #draw{background:#f5c542}
  #reset{background:#ddd}
  .winner{
    font-size:34px;
    margin:20px auto;
    padding:20px;
    max-width:700px;
    background:#222;
    border-radius:14px;
    min-height:44px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:10px;
    max-width:1000px;
    margin:16px auto;
  }
  .card{
    background:#222;
    padding:12px;
    border-radius:10px;
  }
  .out{
    opacity:.45;
    text-decoration:line-through;
  }
</style>
</head>
<body>

<h1>Sorteo de entradas</h1>

<button id="draw">SACAR PAPELETA</button>
<button id="reset">REINICIAR</button>

<div id="winner" class="winner">Pulsa el botón para empezar</div>

<h2>En juego</h2>
<div id="pool" class="grid"></div>

<h2>Ya salidas</h2>
<div id="out" class="grid"></div>

<script>
const inicial = [
  "Encarna","Encarna","Encarna","Encarna",
  "Charo",
  "Petri",
  "María A","María A","María A","María A",
  "María Eugenia","María Eugenia","María Eugenia","María Eugenia",
  "Carmen","Carmen",
  "Paquita","Paquita","Paquita","Paquita",
  "Julia","Julia","Julia","Julia",
  "Marian","Marian",
  "Toñi R","Toñi R","Toñi R","Toñi R","Toñi R",
  "Pilar LP","Pilar LP"
];

let pool = [];
let salidas = [];

function mostrar(){
  const p = document.getElementById("pool");
  const o = document.getElementById("out");
  p.innerHTML = "";
  o.innerHTML = "";

  pool.forEach(n => {
    const d = document.createElement("div");
    d.className = "card";
    d.textContent = n;
    p.appendChild(d);
  });

  salidas.forEach(n => {
    const d = document.createElement("div");
    d.className = "card out";
    d.textContent = n;
    o.appendChild(d);
  });
}

function reiniciar(){
  pool = [...inicial];
  salidas = [];
  document.getElementById("winner").textContent = "Pulsa el botón para empezar";
  mostrar();
}

function sacar(){
  if(pool.length === 0){
    alert("Ya no quedan papeletas");
    return;
  }

  const i = Math.floor(Math.random() * pool.length);
  const nombre = pool.splice(i, 1)[0];
  salidas.push(nombre);

  document.getElementById("winner").textContent = "Ha salido: " + nombre;
  mostrar();
}

document.getElementById("draw").addEventListener("click", sacar);
document.getElementById("reset").addEventListener("click", reiniciar);

reiniciar();
</script>

</body>
</html>
